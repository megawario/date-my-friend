<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avian Compatibility Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAFAF7;
    --orange: #E8651A;
    --orange-light: #F5854A;
    --orange-pale: #FDF0E8;
    --slate: #3D5A73;
    --slate-light: #6B8BA4;
    --taupe: #C4B5A5;
    --taupe-light: #EDE8E3;
    --charcoal: #1C1917;
    --mid: #6B6560;
    --white: #FFFFFF;
    --error: #C0392B;
    --success: #2E7D52;
    --radius: 16px;
    --radius-sm: 8px;
    --shadow: 0 4px 32px rgba(28,25,23,0.08), 0 1px 4px rgba(28,25,23,0.04);
  }

  body {
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-feather {
    position: fixed;
    right: -80px;
    bottom: -60px;
    opacity: 0.045;
    pointer-events: none;
    z-index: 0;
    transform: rotate(-20deg);
  }
  .bg-feather-tl {
    position: fixed;
    left: -100px;
    top: -80px;
    opacity: 0.035;
    pointer-events: none;
    z-index: 0;
    transform: rotate(160deg) scaleX(-1);
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 620px;
    padding: 24px 16px;
  }

  /* CARD — closing brace is present */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--taupe-light);
    padding: 48px 52px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: var(--radius) var(--radius) 0 0;
  }

  /* BRAND */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .brand-icon { color: var(--orange); }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
  }

  /* INTRO */
  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1.15;
    color: var(--charcoal);
    margin-bottom: 6px;
  }
  .intro-subtitle {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 20px;
  }
  .intro-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    line-height: 1.7;
    color: var(--mid);
    margin-bottom: 32px;
    border-left: 2px solid var(--taupe);
    padding-left: 16px;
  }

  /* VALIDATION CODE */
  .vcode-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--slate-light);
    margin-bottom: 6px;
  }
  .vcode-box {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--taupe-light);
    border: 1px solid var(--taupe);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    margin-bottom: 36px;
  }
  .vcode-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--slate);
    user-select: all;
    cursor: text;
  }
  .vcode-egg { color: var(--taupe); flex-shrink: 0; }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--taupe);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--taupe-light);
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(232,101,26,0.25);
    letter-spacing: 0.01em;
  }
  .btn:hover { background: var(--orange-light); box-shadow: 0 4px 20px rgba(232,101,26,0.35); }
  .btn:active { transform: scale(0.98); }
  .btn-full { width: 100%; justify-content: center; }
  .btn-slate {
    background: var(--slate);
    box-shadow: 0 2px 12px rgba(61,90,115,0.18);
  }
  .btn-slate:hover { background: var(--slate-light); box-shadow: 0 4px 20px rgba(61,90,115,0.28); }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 32px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate-light);
  }
  .progress-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--taupe);
  }
  .progress-track {
    height: 6px;
    background: var(--taupe-light);
    border-radius: 99px;
    position: relative;
    overflow: visible;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
    position: relative;
  }
  .progress-bird {
    position: absolute;
    right: -10px;
    top: -12px;
    color: var(--orange);
    pointer-events: none;
  }

  /* QUESTION */
  .q-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--charcoal);
    margin-bottom: 28px;
  }

  /* INPUT */
  .input-wrap { position: relative; margin-bottom: 24px; }
  .inp {
    width: 100%;
    border: 1.5px solid var(--taupe);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    color: var(--charcoal);
    background: var(--cream);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .inp:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,101,26,0.1);
    background: var(--white);
  }
  .inp.inp-err  { border-color: var(--error); background: #fdf5f5; }
  .inp.inp-err:focus  { box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
  .inp.inp-ok   { border-color: var(--success); background: #f4fdf8; }
  .inp.inp-ok:focus   { box-shadow: 0 0 0 3px rgba(46,125,82,0.1); }
  textarea.inp  { resize: vertical; min-height: 110px; }

  .inp-feedback {
    font-size: 12px;
    margin-top: 6px;
    min-height: 18px;
    font-weight: 500;
  }
  .inp-feedback.err  { color: var(--error); }
  .inp-feedback.ok   { color: var(--success); }
  .inp-feedback.hint { color: var(--slate-light); }

  /* YES/NO */
  .yn-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .yn-btn {
    border: 1.5px solid var(--taupe);
    background: var(--cream);
    border-radius: var(--radius-sm);
    padding: 18px 12px;
    font-size: 16px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    color: var(--charcoal);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .yn-btn:hover { border-color: var(--orange); background: var(--orange-pale); }
  .yn-btn.selected {
    border-color: var(--orange);
    background: var(--orange-pale);
    color: var(--orange);
    font-weight: 600;
  }

  /* MULTIPLE CHOICE */
  .mc-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .mc-opt {
    border: 1.5px solid var(--taupe);
    background: var(--cream);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--charcoal);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .mc-opt:hover { border-color: var(--orange); background: var(--orange-pale); }
  .mc-opt.selected { border-color: var(--orange); background: var(--orange-pale); color: var(--orange); font-weight: 500; }
  .mc-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid currentColor;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .mc-opt.selected .mc-dot { background: var(--orange); border-color: var(--orange); }
  .mc-dot-inner {
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .mc-opt.selected .mc-dot-inner { opacity: 1; }

  /* NUMERIC */
  .num-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .num-feedback {
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 20px;
  }
  .num-feedback.higher { color: var(--orange); }
  .num-feedback.lower  { color: var(--slate); }

  /* RESULTS */
  .results-score-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--slate-light);
    text-align: center;
    margin-bottom: 8px;
  }
  .results-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 86px;
    font-weight: 600;
    color: var(--orange);
    text-align: center;
    line-height: 1;
    margin-bottom: 4px;
  }
  .results-pct { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--taupe); }
  .results-status {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--slate);
    text-align: center;
    margin-bottom: 28px;
  }
  .results-bird {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
    color: var(--orange);
    opacity: 0.85;
  }
  .results-vcode-section {
    border-top: 1px solid var(--taupe-light);
    padding-top: 20px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* FOOTER */
  .footer-tracks {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    opacity: 0.3;
    color: var(--slate);
  }

  /* +1 ANIMATION OVERLAY */
  .plus-one-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .plus-one-bubble {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: white;
    border-radius: 16px;
    padding: 16px 32px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(232,101,26,0.35);
    animation: plusOnePop 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .plus-one-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 600;
    line-height: 1;
    display: block;
  }
  .plus-one-msg {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.9;
    display: block;
    margin-top: 4px;
  }
  @keyframes plusOnePop {
    0%   { opacity: 0; transform: scale(0.6) translateY(30px); }
    15%  { opacity: 1; transform: scale(1.08) translateY(-8px); }
    30%  { transform: scale(1) translateY(0); }
    70%  { opacity: 1; transform: scale(1) translateY(-10px); }
    100% { opacity: 0; transform: scale(0.9) translateY(-40px); }
  }

  /* DID YOU KNOW SLIDE */
  .dyk-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--slate-light);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dyk-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 500;
    color: var(--charcoal);
    margin-bottom: 6px;
    line-height: 1.15;
  }
  .dyk-title span { color: var(--orange); }
  .dyk-fact {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    line-height: 1.6;
    color: var(--mid);
    border-left: 3px solid var(--orange-light);
    padding: 14px 18px;
    background: var(--orange-pale);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 24px 0 32px;
  }

  /* RESULTS TIME */
  .results-time {
    font-size: 12px;
    color: var(--taupe);
    font-family: 'Inter', sans-serif;
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  @media (max-width: 540px) {
    .card { padding: 32px 24px; }
    .intro-title { font-size: 30px; }
    .q-text { font-size: 22px; }
    .results-score { font-size: 64px; }
  }
</style>
</head>
<body>

<svg class="bg-feather" width="520" height="680" viewBox="0 0 520 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M260 10 C260 10, 480 180, 430 420 C380 660, 130 650, 100 500 C70 350, 200 280, 260 10Z" fill="#3D5A73"/>
  <path d="M260 10 C260 10, 200 280, 180 500" stroke="#3D5A73" stroke-width="3" fill="none"/>
  <path d="M260 10 C290 120, 380 200, 410 350" stroke="#3D5A73" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M255 60 C280 140, 350 220, 380 370" stroke="#3D5A73" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M248 110 C260 200, 310 290, 330 420" stroke="#3D5A73" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M240 170 C248 260, 280 360, 280 470" stroke="#3D5A73" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M230 240 C234 330, 248 430, 232 540" stroke="#3D5A73" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
<svg class="bg-feather-tl" width="420" height="560" viewBox="0 0 420 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M210 10 C210 10, 390 150, 350 350 C310 550, 100 540, 80 410 C60 280, 160 230, 210 10Z" fill="#E8651A"/>
  <path d="M210 10 C210 10, 160 230, 145 410" stroke="#E8651A" stroke-width="2.5" fill="none"/>
</svg>

<div class="app">
  <div class="card" id="main-card"></div>
  <div class="footer-tracks">
    <svg width="12" height="20" viewBox="0 0 12 20"><ellipse cx="6" cy="3" rx="2" ry="3" fill="currentColor"/><path d="M2 10 L6 7 L10 10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 14 L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 14 L6 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <svg width="12" height="20" viewBox="0 0 12 20"><ellipse cx="6" cy="3" rx="2" ry="3" fill="currentColor"/><path d="M2 10 L6 7 L10 10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 14 L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 14 L6 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <svg width="12" height="20" viewBox="0 0 12 20" style="transform:translateX(8px)"><ellipse cx="6" cy="3" rx="2" ry="3" fill="currentColor"/><path d="M2 10 L6 7 L10 10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 14 L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 14 L6 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <svg width="12" height="20" viewBox="0 0 12 20" style="transform:translateX(8px)"><ellipse cx="6" cy="3" rx="2" ry="3" fill="currentColor"/><path d="M2 10 L6 7 L10 10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 14 L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 14 L6 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <svg width="12" height="20" viewBox="0 0 12 20" style="transform:translateX(16px)"><ellipse cx="6" cy="3" rx="2" ry="3" fill="currentColor"/><path d="M2 10 L6 7 L10 10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 14 L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 14 L6 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<script>
// ─── SVG CONSTANTS ────────────────────────────────────────────────────────────
const BIRD_SVG = `<svg width="24" height="16" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 9 C4 5, 8 3, 12 4 C14 4.5, 16 6, 20 3 C22 2, 23 1, 24 0 C23 2, 22 5, 20 6 C18 7, 16 6.5, 14 7 C12 7.5, 10 9, 8 11 C6 13, 3 14, 0 13 Z" fill="currentColor"/><path d="M12 4 L14 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;

const FEATHER_SMALL = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1 C8 1, 14 5, 13 10 C12 15, 4 15, 3.5 12 C3 9, 7 7, 8 1Z" fill="currentColor" opacity="0.25"/><path d="M8 1 C8 1, 6 8, 5.5 12" stroke="currentColor" stroke-width="1" fill="none"/></svg>`;

const EGG_SVG = `<svg width="20" height="24" viewBox="0 0 20 24" fill="none"><ellipse cx="10" cy="13" rx="8" ry="10" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/></svg>`;

const CHEVRON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const CHECK_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const ARROW_UP   = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 11V3M4 6L7 3L10 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const ARROW_DOWN = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3V11M4 8L7 11L10 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// ─── VALIDATION CODE ──────────────────────────────────────────────────────────
function generateCode() {
  const encoded = Date.now().toString(36).toUpperCase().slice(-6);
  let sum = 0;
  for (const c of encoded) sum = (sum + c.charCodeAt(0)) & 0xFFFF;
  const checksum = sum.toString(16).toUpperCase().padStart(4, '0');
  return `FC-${encoded}-${checksum}`;
}

function generateEndCode(startCode) {
  // Add a random 3-digit number prefix, then change only the last character
  const prefix = Math.floor(100 + Math.random() * 900);
  const lastChar = startCode[startCode.length - 1];
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789'.replace(lastChar, '');
  const newLast = chars[Math.floor(Math.random() * chars.length)];
  return `${prefix}-${startCode.slice(0, -1)}${newLast}`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
// Pre-pick which question indices will be preceded by a DYK slide (2 random ones)
function pickDykSlots(numQuestions) {
  const slots = new Set();
  // Place DYK slides before question indices 3–17, not at the very start or end
  const pool = [];
  for (let i = 2; i < numQuestions - 3; i++) pool.push(i);
  while (slots.size < 2 && pool.length) {
    const idx = Math.floor(Math.random() * pool.length);
    slots.add(pool[idx]);
    pool.splice(idx, 1);
  }
  return slots;
}

  dykShown: new Set(),    // Which DYK slots already shown

  dykFactIndex: 0,

// ─── SCORE ────────────────────────────────────────────────────────────────────
function computeScore() {
  let base = 47;
  Object.values(state.answers).forEach((v, i) => {
    const code = (v || '').toString().charCodeAt(0) || 0;
    base = (base + code * (i + 1)) % 37 + (i % 5);
  });
  return 51 + (base % 44);
}

function getStatus(score) {
  if (score >= 88) return 'Mabye';
  if (score >= 78) return 'Thinking about it';
  if (score >= 68) return 'Horrible score';
  if (score >= 58) return 'Ewh';
  return 'Compatibility Pending Further Review';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── TRANSITIONS ──────────────────────────────────────────────────────────────
function transition(renderFn) {
  const card = document.getElementById('main-card');

  card.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(-16px) scale(0.98)';

  setTimeout(() => {
    card.innerHTML = renderFn();

    card.style.transition = 'none';
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px) scale(0.98)';

    void card.offsetHeight; // force reflow

    card.style.transition = 'opacity 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1)';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0) scale(1)';

    const inp = card.querySelector('input, textarea');
    if (inp) setTimeout(() => inp.focus(), 80);
  }, 240);
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function startSurvey() {
  state.qIndex = 0;
  state.currentValue = null;
  state.startTime = Date.now();
  state.dykSlots = pickDykSlots(questions.length);
  state.inDyk = false;
  transition(renderQuestion);
}

function onTextInput(val) {
  state.currentValue = val;
  const q = questions[state.qIndex];
  const card = document.getElementById('main-card');

  if (q.type === 'text' || q.type === 'textarea') {
    const fb = q.feedback ? q.feedback(val) : null;
    const inp = document.getElementById('ans-inp');
    const fbEl = card.querySelector('.inp-feedback');
    if (inp) inp.className = 'inp' + (fb ? ' inp-' + fb.cls : '');
    if (fbEl) { fbEl.className = 'inp-feedback' + (fb ? ' ' + fb.cls : ''); fbEl.innerHTML = fb ? fb.msg : ''; }

  } else if (q.type === 'numeric') {
    const fb = q.numFeedback ? q.numFeedback(val) : null;
    const fbEl = card.querySelector('.num-feedback');
    if (fbEl) { fbEl.className = 'num-feedback' + (fb ? ' ' + fb.cls : ''); fbEl.innerHTML = fb ? fb.msg : ''; }
  }

  refreshNextButton();
}

function showPlusOne() {
  const msg = ENCOURAGING_MESSAGES[Math.floor(Math.random() * ENCOURAGING_MESSAGES.length)];
  const overlay = document.createElement('div');
  overlay.className = 'plus-one-overlay';
  overlay.innerHTML = `<div class="plus-one-bubble">
    <span class="plus-one-num">+1</span>
    <span class="plus-one-msg">${msg}</span>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1700);
}

function selectYN(val) {
  state.currentValue = val;
  const q = questions[state.qIndex];
  const card = document.getElementById('main-card');

  card.querySelectorAll('.yn-btn').forEach((b, i) => {
    const isYes = i === 0;
    const selected = (isYes && val === 'yes') || (!isYes && val === 'no');
    b.className = 'yn-btn' + (selected ? ' selected' : '');
    b.innerHTML = (selected && isYes) ? `${CHECK_SVG} Yes` : (isYes ? 'Yes' : 'No');
  });

  const fb = q.feedback ? q.feedback(val) : null;
  const fbEl = card.querySelector('.inp-feedback');
  if (fbEl) { fbEl.className = 'inp-feedback' + (fb ? ' ' + fb.cls : ''); fbEl.innerHTML = fb ? fb.msg : ''; }

  // Show +1 animation for "yes" answers (considered the "correct" positive answer)
  if (val === 'yes') showPlusOne();

  refreshNextButton();
}

function continuFromDyk() {
  state.inDyk = false;
  transition(renderQuestion);
}

function nextQuestion() {
  const q = questions[state.qIndex];
  if (!q.validate(state.currentValue)) return;

  state.answers[q.id] = state.currentValue;
  state.qIndex++;

  if (state.qIndex >= questions.length) {
    transition(renderResults);
  } else {
    state.currentValue = null;
    // Check if this question index should show a DYK first
    if (state.dykSlots && state.dykSlots.has(state.qIndex) && !state.dykShown.has(state.qIndex)) {
      state.dykShown.add(state.qIndex);
      state.inDyk = true;
      transition(renderDyk);
    } else {
      transition(renderQuestion);
    }
  }
}

function selectMC(btn) {
  const val = btn.dataset.value;
  state.currentValue = val;

  document.querySelectorAll('#main-card .mc-opt').forEach(b => {
    b.className = 'mc-opt' + (b.dataset.value === val ? ' selected' : '');
  });

  refreshNextButton();
}

function refreshNextButton() {
  const q = questions[state.qIndex];
  const btn = document.getElementById('btn-next');
  if (!btn) return;
  const valid = q.validate(state.currentValue);
  btn.style.opacity = valid ? '1' : '0.55';
  btn.style.cursor  = valid ? 'pointer' : 'not-allowed';
  btn.className = 'btn btn-full btn-next' + (valid ? '' : ' btn-slate');
}
